<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Vagelis Tsopanos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <style>
      :root {
        --black: #151515;
        --green: #4ee1a0;
        --white: #ffffff;
        --gray: #d9d9d9;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--black);
        color: var(--white);
        font-family: "Space Grotesk", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 600px;
      }
      .error-code {
        font-size: 8rem;
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(135deg, #4ee1a0, #3bc485, #2dd4bf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: var(--white);
      }
      p {
        font-size: 1.125rem;
        color: var(--gray);
        margin-bottom: 2.5rem;
        line-height: 1.6;
      }
      .back-btn {
        display: inline-block;
        font-family: "Space Grotesk", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 1rem 2.5rem;
        background: linear-gradient(135deg, #4ee1a0, #3bc485, #2dd4bf);
        color: var(--black);
        text-decoration: none;
        border: none;
        cursor: pointer;
        transition: all 0.35s ease;
        box-shadow: 0 4px 24px rgba(78, 225, 160, 0.25);
      }
      .back-btn:hover {
        box-shadow: 0 6px 32px rgba(78, 225, 160, 0.4);
        transform: translateY(-2px);
      }
      @media (max-width: 425px) {
        .error-code { font-size: 5rem; }
        h1 { font-size: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <a href="./" class="back-btn">Back to Portfolio</a>
    </div>
  </body>
</html>
